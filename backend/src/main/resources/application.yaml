spring:
  datasource:
    url: jdbc:mysql://localhost:3306/logistica_db
    username: root
    password: root1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    generate-ddl: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      fail-on-empty-beans: false

server:
  port: 8080

app:
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    secret: 4f8d7b0f6bba4a6aa9a91ce2f0875b8f4f8d7b0f6bba4a6aa9a91ce2f0875b8f
    expiration-ms: 86400000
