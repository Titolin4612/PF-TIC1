services:
  mysql:
    image: mysql:8.0
    container_name: smartroute-db
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: logistica_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: smartroute-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/logistica_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root1234
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175
      APP_JWT_SECRET: 4f8d7b0f6bba4a6aa9a91ce2f0875b8f4f8d7b0f6bba4a6aa9a91ce2f0875b8f
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
